spring.application.name=app

# SQL Server Configuration
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ClinicDB;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# JWT Secret Key (base64, tối thiểu 256-bit)
# THAY BẰNG GIÁ TRỊ RIÊNG của bạn, KHÔNG commit key thật lên Git
jwt.secret=5a7134743777217a25432a462d4a614e645267556b58703273357638792f413f
# Access Token hết hạn sau 15 phút (milliseconds)
jwt.expiration-ms=900000
# Refresh Token hết hạn sau 7 ngày (milliseconds)
jwt.refresh-expiration-ms=604800000